services:
  horror-roadmap:
    image: ghcr.io/cheapnud/cheapnights:latest
    container_name: horror-roadmap
    restart: unless-stopped
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=192.168.1.14;Port=5432;Database=cheapnights;Username=cheapnights;Password=${PG_PASSWORD}
      - Plex__AdminToken=${PLEX_ADMIN_TOKEN}
      - Serilog__WriteTo__0__Name=Seq
      - Serilog__WriteTo__0__Args__serverUrl=http://192.168.1.15:5341
    ports:
      - "5010:5000"
